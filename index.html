<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مكتبة د. عبدالولي الشميري</title>
<style>
  @font-face {
    font-family: 'Traditional Arabic';
    src: local('Traditional Arabic Bold'),
         local('TraditionalArabic-Bold'),
         local('Traditional Arabic');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg:           #f0f6fc;
    --surface:      #ffffff;
    --primary:      #1a5fb4;
    --primary-dark: #0d3d7a;
    --primary-light:#4a9fd4;
    --primary-pale:   #d6eaf8;
    --accent-sky:     #7ec8e3;
    --text:         #1a2d42;
    --text-muted:   #5a7a9a;
    --border:       #a8cce8;
    --border-focus: #1a5fb4;
    --shadow:       0 2px 12px rgba(26, 95, 180, 0.1);
    --radius:       10px;
    --label-w:      155px;
    --serial-w:     120px;
    --fs-base:      clamp(16px, 4.2vw, 18px);
    --fs-label:     clamp(15px, 3.8vw, 17px);
    --fs-header:    clamp(1.35rem, 5vw, 2.4rem);
    --page-pad:     clamp(8px, 2.5vw, 16px);
    --form-pad:     clamp(12px, 3.5vw, 28px);
    --field-gap:    clamp(8px, 2vw, 14px);
    --touch-min:    48px;
    --danger:       #c62828;
    --danger-bg:    #ffebee;
    --success:      #2e7d32;
    --success-bg:   #e8f5e9;
    --warning:      #e65100;
    --warning-bg:   #fff3e0;
    --info:         #1565c0;
    --info-bg:      #e3f2fd;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Traditional Arabic', 'Arabic Typesetting', serif;
    font-size: var(--fs-base);
    font-weight: 700;
    background: linear-gradient(160deg, var(--bg) 0%, #e8f4fc 50%, #f8fbff 100%);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
    line-height: 1.45;
    padding: var(--page-pad);
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    -webkit-text-size-adjust: 100%;
  }

  .wrap {
    width: 100%;
    max-width: 920px;
    margin: 0 auto;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: clamp(10px, 2.5vw, 14px);
    box-shadow: var(--shadow), 0 8px 32px rgba(26, 95, 180, 0.08);
    overflow: hidden;
  }

  /* ─── الترويسة ─── */
  .lib-header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 45%, var(--primary-light) 100%);
    padding: clamp(20px, 5vw, 32px) clamp(16px, 4vw, 28px);
    text-align: center;
    border-bottom: 3px solid var(--accent-sky);
  }
  .lib-header h1 {
    font-size: var(--fs-header);
    font-weight: 700;
    color: #fff;
    line-height: 1.35;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    letter-spacing: 0.02em;
  }
  /* ─── شريط البحث / الفلتر ─── */
  .filter-bar {
    display: none;
    padding: 12px 16px;
    background: var(--info-bg);
    border-bottom: 1px solid var(--border);
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-bar.visible {
    display: flex;
    flex-wrap: wrap;
  }
  .filter-bar span {
    font-size: var(--fs-label);
    color: var(--info);
    flex: 1 1 100%;
  }
  .filter-bar input {
    flex: 1 1 auto;
    min-width: 0;
    width: 100%;
    min-height: var(--touch-min);
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: var(--fs-base);
    font-weight: 700;
    background: #fff;
    outline: none;
  }
  .filter-bar input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.15);
  }
  .filter-clear {
    flex: 0 0 auto;
    min-height: var(--touch-min);
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
    color: var(--text-muted);
    font-family: inherit;
    font-size: var(--fs-label);
    font-weight: 700;
    cursor: pointer;
  }

  /* ─── النموذج (mobile-first) ─── */
  .form-body {
    padding: var(--form-pad);
  }

  .form-row {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
    margin-bottom: var(--field-gap);
  }
  .form-row label {
    flex: none;
    text-align: right;
    font-size: var(--fs-label);
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
    padding-inline-start: 2px;
  }
  .form-row input[type="text"],
  .form-row input[type="number"],
  .form-row input[type="search"] {
    flex: 1;
    width: 100%;
    min-width: 0;
    min-height: var(--touch-min);
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
    color: var(--text);
    font-family: inherit;
    font-size: var(--fs-base);
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-row input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.12);
  }
  .form-row input::placeholder {
    color: var(--text-muted);
    font-weight: 700;
    opacity: 0.75;
  }

  .form-row.serial-row input {
    max-width: none;
    text-align: center;
    direction: ltr;
  }

  .form-row.split {
    display: flex;
    flex-direction: column;
    gap: var(--field-gap);
    margin-bottom: var(--field-gap);
  }
  .form-row.split .half {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
    min-width: 0;
  }
  .form-row.split .half label {
    flex: none;
    font-size: var(--fs-label);
    text-align: right;
  }
  .form-row.split .half input {
    width: 100%;
    min-height: var(--touch-min);
    min-width: 0;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: var(--fs-base);
    font-weight: 700;
    background: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-row.split .half input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.12);
  }

  /* صف الغلاف + هوامش */
  .covers-row {
    display: flex;
    flex-direction: column;
    gap: var(--field-gap);
    margin-bottom: var(--field-gap);
  }
  .covers-row .half {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
    min-width: 0;
  }
  .covers-row .half label {
    flex: none;
    font-size: var(--fs-label);
    font-weight: 700;
    text-align: right;
  }
  .covers-row .half input {
    width: 100%;
    min-height: var(--touch-min);
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: var(--fs-base);
    font-weight: 700;
    background: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .covers-row .half input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.12);
  }
  .margins-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: stretch;
    min-width: 0;
  }
  .margins-col .cover-label {
    font-size: var(--fs-label);
    font-weight: 700;
    text-align: right;
    color: var(--text);
    padding-inline-start: 2px;
  }
  .cover-box {
    min-height: var(--touch-min);
    height: auto;
    padding: 14px 12px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--primary-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--primary);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .cover-box:hover {
    border-color: var(--primary);
    background: #c5e4f7;
  }
  .cover-box svg {
    width: 22px;
    height: 22px;
    opacity: 0.7;
  }
  .margins-half {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
    margin-top: 4px;
  }
  .margins-half label {
    flex: none;
    font-size: var(--fs-label);
    font-weight: 700;
    text-align: right;
  }
  .margins-half input {
    width: 100%;
    min-height: var(--touch-min);
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: var(--fs-base);
    font-weight: 700;
    background: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .margins-half input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(26, 95, 180, 0.12);
  }

  /* ─── الأزرار ─── */
  .actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    padding: 14px var(--form-pad);
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: linear-gradient(180deg, var(--primary-pale) 0%, #e8f4fc 100%);
    border-top: 2px solid var(--border);
  }

  .btn {
    width: 100%;
    min-height: var(--touch-min);
    padding: 12px 14px;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: clamp(15px, 3.8vw, 17px);
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.98); }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-back {
    grid-column: 1 / -1;
  }

  .btn-add {
    background: linear-gradient(180deg, #43a047 0%, var(--success) 100%);
    color: #fff;
  }
  .btn-add:hover { filter: brightness(1.06); }

  .btn-edit {
    background: linear-gradient(180deg, #42a5f5 0%, var(--info) 100%);
    color: #fff;
  }
  .btn-edit:hover { filter: brightness(1.06); }

  .btn-delete {
    background: linear-gradient(180deg, #ef5350 0%, var(--danger) 100%);
    color: #fff;
  }
  .btn-delete:hover { filter: brightness(1.06); }

  .btn-save {
    background: linear-gradient(180deg, var(--primary-light) 0%, var(--primary) 100%);
    color: #fff;
  }
  .btn-save:hover { filter: brightness(1.06); }

  .btn-back {
    background: #fff;
    color: var(--text-muted);
    border: 2px solid var(--border);
    box-shadow: none;
  }
  .btn-back:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .btn-search {
    background: linear-gradient(180deg, #ffb74d 0%, var(--warning) 100%);
    color: #fff;
  }
  .btn-search:hover { filter: brightness(1.06); }
  .btn-search.active {
    box-shadow: 0 0 0 3px rgba(230, 81, 0, 0.35);
  }

  /* تمييز حقول عند الفلترة */
  .form-row input.filter-match,
  .covers-row input.filter-match,
  .form-row.split .half input.filter-match {
    background: #fffde7;
    border-color: #f9a825;
  }
  .form-row input.filter-hide,
  .covers-row input.filter-hide,
  .form-row.split .half input.filter-hide {
    opacity: 0.45;
  }

  /* ─── تابلت: عمودان للحقول المزدوجة ─── */
  @media (min-width: 520px) {
    .form-row.split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--field-gap) clamp(12px, 3vw, 20px);
    }

    .covers-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--field-gap) clamp(12px, 3vw, 20px);
      align-items: start;
    }

    .actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .btn-back {
      grid-column: auto;
    }
  }

  /* ─── شاشات متوسطة: تسمية بجانب الحقل ─── */
  @media (min-width: 640px) {
    .filter-bar.visible {
      flex-wrap: nowrap;
      align-items: center;
    }
    .filter-bar span {
      flex: 0 0 auto;
    }
    .filter-bar input {
      width: auto;
    }

    .form-row.split .half,
    .covers-row .half {
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .form-row.split .half label,
    .covers-row .half label {
      flex: 0 0 clamp(72px, 18vw, 100px);
    }
    .margins-half {
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .margins-half label {
      flex: 0 0 clamp(72px, 18vw, 100px);
    }
  }

  /* ─── موبايل: شريط أزرار ثابت ─── */
  @media (max-width: 767px) {
    .actions {
      position: sticky;
      bottom: 0;
      z-index: 10;
      box-shadow: 0 -4px 20px rgba(26, 95, 180, 0.12);
    }
  }

  /* ─── سطح المكتب ─── */
  @media (min-width: 768px) {
    .form-row {
      flex-direction: row;
      align-items: center;
      gap: 10px clamp(12px, 2vw, 18px);
      min-height: var(--touch-min);
    }
    .form-row label {
      flex: 0 0 var(--label-w);
      text-align: right;
    }

    .form-row.serial-row input {
      flex: 0 1 var(--serial-w);
      max-width: var(--serial-w);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      position: static;
      box-shadow: none;
    }

    .btn {
      flex: 1 1 auto;
      width: auto;
      min-width: 96px;
      max-width: 148px;
      padding: 13px 18px;
    }

    .btn-back {
      grid-column: auto;
    }
  }

  @media (min-width: 900px) {
    .form-row.split .half label,
    .covers-row .half label,
    .margins-half label {
      flex-basis: 100px;
    }
  }
</style>
</head>
<body>

<div class="wrap" id="library-app">
  <header class="lib-header">
    <h1>مكتبة د/ عبد الولي الشميري</h1>
  </header>

  <div class="filter-bar" id="filter-bar" role="search">
    <span>فلتر البحث:</span>
    <input type="search" id="filter-input" placeholder="ابحث في الحقول المعروضة…" autocomplete="off">
    <button type="button" class="filter-clear" id="filter-clear">مسح</button>
  </div>

  <form class="form-body" id="library-form" autocomplete="off" novalidate>
    <div class="form-row serial-row">
      <label for="serial">رقم التسلسل العام</label>
      <input type="text" id="serial" name="serial" data-filter placeholder="">
    </div>

    <div class="form-row">
      <label for="art_no">رقم كتب الفن</label>
      <input type="text" id="art_no" name="art_no" data-filter>
    </div>
    <div class="form-row">
      <label for="title">اسم الكتاب</label>
      <input type="text" id="title" name="title" data-filter>
    </div>
    <div class="form-row">
      <label for="author">اسم المؤلف</label>
      <input type="text" id="author" name="author" data-filter>
    </div>
    <div class="form-row">
      <label for="authors">اسماء المؤلفين</label>
      <input type="text" id="authors" name="authors" data-filter>
    </div>
    <div class="form-row">
      <label for="editors">تحقيق / محققين</label>
      <input type="text" id="editors" name="editors" data-filter>
    </div>

    <div class="form-row split">
      <div class="half">
        <label for="parts">عدد الأجزاء</label>
        <input type="text" id="parts" name="parts" data-filter inputmode="numeric">
      </div>
      <div class="half">
        <label for="pages">الصفحات</label>
        <input type="text" id="pages" name="pages" data-filter inputmode="numeric">
      </div>
    </div>

    <div class="form-row split">
      <div class="half">
        <label for="publisher">الناشر</label>
        <input type="text" id="publisher" name="publisher" data-filter>
      </div>
      <div class="half">
        <label for="country">بلدها</label>
        <input type="text" id="country" name="country" data-filter>
      </div>
    </div>

    <div class="form-row split">
      <div class="half">
        <label for="edition">الطبعة</label>
        <input type="text" id="edition" name="edition" data-filter>
      </div>
      <div class="half">
        <label for="edition_date">تاريخها</label>
        <input type="text" id="edition_date" name="edition_date" data-filter>
      </div>
    </div>

    <div class="form-row split">
      <div class="half">
        <label for="copies">عدد النسخ</label>
        <input type="text" id="copies" name="copies" data-filter inputmode="numeric">
      </div>
      <div class="half">
        <label for="color">اللون</label>
        <input type="text" id="color" name="color" data-filter>
      </div>
    </div>

    <div class="covers-row">
      <div class="half">
        <label for="covers">الأغلفة</label>
        <input type="text" id="covers" name="covers" data-filter>
      </div>
      <div class="margins-col">
        <span class="cover-label">صورة الغلاف</span>
        <div class="cover-box" id="cover-upload" role="button" tabindex="0" aria-label="رفع صورة الغلاف">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>اختر صورة</span>
        </div>
        <input type="file" id="cover-file" accept="image/*" hidden>
        <div class="half margins-half">
          <label for="margins">هوامش</label>
          <input type="text" id="margins" name="margins" data-filter>
        </div>
      </div>
    </div>

    <div class="form-row">
      <label for="locations">أماكنها</label>
      <input type="text" id="locations" name="locations" data-filter>
    </div>
    <div class="form-row">
      <label for="notes">شرح</label>
      <input type="text" id="notes" name="notes" data-filter>
    </div>
  </form>

  <div class="actions">
    <button type="button" class="btn btn-add" data-action="add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      اضافة
    </button>
    <button type="button" class="btn btn-edit" data-action="edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      تعديل
    </button>
    <button type="button" class="btn btn-delete" data-action="delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      حذف
    </button>
    <button type="button" class="btn btn-save" data-action="save">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
      حفظ
    </button>
    <button type="button" class="btn btn-search" id="btn-search" data-action="search" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      بحث
    </button>
    <button type="button" class="btn btn-back" data-action="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      عودة
    </button>
  </div>
</div>

<script>
(function () {
  var form = document.getElementById('library-form');
  var filterBar = document.getElementById('filter-bar');
  var filterInput = document.getElementById('filter-input');
  var filterClear = document.getElementById('filter-clear');
  var btnSearch = document.getElementById('btn-search');
  var filterFields = form.querySelectorAll('[data-filter]');
  var coverBox = document.getElementById('cover-upload');
  var coverFile = document.getElementById('cover-file');

  function postToApp(action, payload) {
    var msg = JSON.stringify({ action: action, data: payload || {} });
    if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
      window.flutter_inappwebview.callHandler('libraryForm', msg);
    } else if (window.LibraryForm && typeof window.LibraryForm.postMessage === 'function') {
      window.LibraryForm.postMessage(msg);
    } else {
      console.log('libraryForm:', msg);
    }
  }

  function collectForm() {
    var data = {};
    filterFields.forEach(function (el) {
      data[el.name || el.id] = (el.value || '').trim();
    });
    return data;
  }

  function applyFilter() {
    var q = (filterInput.value || '').trim().toLowerCase();
    if (!q) {
      filterFields.forEach(function (el) {
        el.classList.remove('filter-match', 'filter-hide');
      });
      return;
    }
    var anyMatch = false;
    filterFields.forEach(function (el) {
      var val = (el.value || '').toLowerCase();
      var match = val.indexOf(q) !== -1;
      el.classList.toggle('filter-match', match && val.length > 0);
      el.classList.toggle('filter-hide', !match);
      if (match) anyMatch = true;
    });
    if (!anyMatch) {
      filterFields.forEach(function (el) { el.classList.remove('filter-hide'); });
    }
  }

  function toggleSearchMode() {
    var on = filterBar.classList.toggle('visible');
    btnSearch.classList.toggle('active', on);
    btnSearch.setAttribute('aria-pressed', on ? 'true' : 'false');
    if (on) {
      filterInput.focus();
    } else {
      filterInput.value = '';
      applyFilter();
    }
  }

  btnSearch.addEventListener('click', toggleSearchMode);
  filterInput.addEventListener('input', applyFilter);
  filterClear.addEventListener('click', function () {
    filterInput.value = '';
    applyFilter();
    filterInput.focus();
  });

  document.querySelectorAll('.actions .btn[data-action]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var action = btn.getAttribute('data-action');
      if (action === 'search') return;
      postToApp(action, collectForm());
    });
  });

  if (coverBox && coverFile) {
    coverBox.addEventListener('click', function () { coverFile.click(); });
    coverBox.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); coverFile.click(); }
    });
    coverFile.addEventListener('change', function () {
      var f = coverFile.files && coverFile.files[0];
      if (!f) return;
      var span = coverBox.querySelector('span');
      if (span) span.textContent = f.name;
      postToApp('coverSelected', { name: f.name });
    });
  }

  window.libraryFormSetData = function (data) {
    if (!data || typeof data !== 'object') return;
    Object.keys(data).forEach(function (key) {
      var el = form.querySelector('[name="' + key + '"], #' + key);
      if (el) el.value = data[key] != null ? String(data[key]) : '';
    });
    applyFilter();
  };

  window.libraryFormGetData = collectForm;
})();
</script>
</body>
</html>
